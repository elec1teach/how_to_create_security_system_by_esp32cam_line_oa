<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURITY LAB - ESP32-CAM Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #020617;
        --panel-bg: rgba(15, 23, 42, 0.7);
        --neon-blue: #00ffff;
        --neon-purple: #8b5cf6;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Prompt', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(0, 255, 255, 0.05), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
    }

    /* แถบเมนูด้านซ้าย */
    .sidebar {
        width: 320px;
        background: var(--panel-bg);
        border-right: 1px solid rgba(0, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 20px;
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        color: var(--neon-blue);
        text-shadow: 0 0 10px var(--neon-blue);
        margin-bottom: 25px;
        text-align: center;
        letter-spacing: 2px;
    }

    .mission-list { 
        list-style: none; 
        overflow-y: auto; 
        flex: 1;
        padding-right: 5px;
    }
    
    .mission-list::-webkit-scrollbar { width: 4px; }
    .mission-list::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 10px; }

    .mission-item {
        margin-bottom: 12px;
        padding: 14px;
        border-radius: 10px;
        background: rgba(255,255,255,0.01);
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .mission-item:hover {
        border-color: rgba(0, 255, 255, 0.4);
        background: rgba(0, 255, 255, 0.04);
    }

    .mission-item.active {
        border-color: var(--neon-blue);
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        background: rgba(0, 255, 255, 0.08);
    }

    .mission-id { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 13px; color: var(--neon-blue); }
    .mission-title { font-weight: 500; font-size: 14px; color: var(--text-main); margin: 2px 0; }
    .mission-desc { font-size: 11px; color: var(--text-muted); display: none; }

    .mission-item.active .mission-desc { display: block; }

    /* พื้นที่เนื้อหาหลัก */
    .main-content {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow-y: auto;
    }

    /* พื้นที่แสดงไฟล์ PDF */
    .pdf-container {
        width: 100%;
        height: calc(100vh - 90px);
        background: #1e293b;
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        overflow: hidden;
        position: relative;
        flex: 1;
        min-height: 400px;
    }
    
    .pdf-placeholder {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #64748b;
        text-align: center;
        z-index: 1;
    }

    .pdf-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        position: relative;
        z-index: 2;
        background: white;
    }

    /* ปุ่ม AI */
    .ask-ai-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(45deg, #00ffff, #8b5cf6);
        color: #020617;
        font-family: 'Prompt', sans-serif;
        font-weight: 600;
        padding: 14px 22px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        transition: all 0.3s ease;
        z-index: 100;
    }

    .ask-ai-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 25px rgba(139, 92, 246, 0.5);
    }

    /* 📱 การจัดหน้าจอสำหรับมือถือและแท็บเล็ต */
    @media (max-width: 850px) {
        body {
            flex-direction: column;
            overflow-y: auto;
            height: auto;
        }
        .sidebar {
            width: 100%;
            height: auto;
            max-height: 250px;
            border-right: none;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }
        .main-content {
            height: auto;
            overflow: visible;
            padding: 20px;
        }
        .pdf-container {
            height: 80vh;
        }
        .ask-ai-btn {
            bottom: 15px;
            right: 15px;
            padding: 10px 16px;
            font-size: 13px;
        }
    }
</style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">SECURITY LAB</div>
        <ul class="mission-list" id="sidebarMenu"></ul>
    </aside>

    <main class="main-content">
        <h3 style="color: var(--neon-blue); margin-bottom: 12px; font-size: 16px;">📄 Operation Manual (คู่มือปฏิบัติการ)</h3>
        
        <div class="pdf-container">
            <div class="pdf-placeholder" id="pdfPlaceholder">กำลังโหลดเอกสาร...</div>
            <iframe id="pdfViewer" src=""></iframe>
        </div>
    </main>

    <button class="ask-ai-btn" onclick="openAITips()">
        ✨ Ask Gemini Tutor
    </button>

<script>
// ฐานข้อมูลบทเรียนเปลี่ยนเป็นระบบ IoT Security ด้วย ESP32-CAM
const database = [
    {
        id: "MISSION 1.1",
        title: "System Overview",
        desc: "ทำความเข้าใจบล็อกไดอะแกรม ทิศทางการไหลของข้อมูลภาพ Base64 จากตัวบอร์ดไปยัง LINE OA",
        pdf: "mission1_1.pdf"
    },
    {
        id: "MISSION 1.2",
        title: "LINE OA & Token Setup",
        desc: "ขั้นตอนสมัคร LINE Developers เพื่อออกรหัส Channel Access Token และค้นหาค่า User ID ของตัวเอง",
        pdf: "mission1_2.pdf"
    },
    {
        id: "MISSION 1.3",
        title: "Google Apps Script API",
        desc: "การสร้างโปรเจกต์สคริปต์เซิร์ฟเวอร์เลส เชื่อมต่อ Google Drive และ Deploy Web App เป็น API ตัวกลาง",
        pdf: "mission1_3.pdf"
    },
    {
        id: "MISSION 1.4",
        title: "Hardware & Switch Wiring",
        desc: "แผนผังการต่อวงจรสวิตช์ปุ่มกดเข้ากับขาพิน GPIO 14 และการเชื่อมตัวบอร์ดเข้ากับโมดูลอัปโหลด FTDI",
        pdf: "mission1_4.pdf"
    },
    {
        id: "MISSION 1.5",
        title: "Firmware Programming",
        desc: "การเขียนซอร์สโค้ดใน Arduino IDE ติดตั้งคลังไลบรารีกล้อง การเข้ารหัสสตริง และล้าง Buffer ตกค้าง",
        pdf: "mission1_5.pdf"
    },
    {
        id: "MISSION 1.6",
        title: "System Test & Debug",
        desc: "ทดสอบกดปุ่ม ตรวจเช็ก Log ความเร็ว 115200 ผ่าน Serial Monitor และวิเคราะห์รหัส HTTP Code สำเร็จ",
        pdf: "mission1_6.pdf"
    }
];

function initSystem() {
    const menuContainer = document.getElementById("sidebarMenu");
    menuContainer.innerHTML = "";
    
    database.forEach((data, index) => {
        const li = document.createElement("li");
        li.className = "mission-item";
        if(index === 0) li.className += " active";
        li.setAttribute("onclick", `selectMission(${index})`);
        
        li.innerHTML = `
            <div class="mission-id">${data.id}</div>
            <div class="mission-title">${data.title}</div>
            <div class="mission-desc">${data.desc}</div>
        `;
        menuContainer.appendChild(li);
    });
    
    selectMission(0);
}

function selectMission(index) {
    const items = document.querySelectorAll(".mission-item");
    items.forEach(item => item.classList.remove("active"));
    items[index].classList.add("active");
    
    const mission = database[index];
    
    const pdfViewer = document.getElementById("pdfViewer");
    
    // ดึง URL ปัจจุบันแบบเต็ม
    const currentBaseUrl = window.location.href.split('?')[0];
    
    // สร้าง URL ของไฟล์ PDF
    const absolutePdfUrl = new URL(mission.pdf, currentBaseUrl).href;
    
    // ตรวจจับอุปกรณ์
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    if (isMobile) {
        pdfViewer.src = `https://docs.google.com/gview?url=${encodeURIComponent(absolutePdfUrl)}&embedded=true`;
    } else {
        pdfViewer.src = mission.pdf;
    }
}

function openAITips() {
    alert(
        "🤖 แนะนำวิธียื่นคำถามให้ที่ปรึกษาหลัก (Gemini Tutor):\n\n" +
        "1. เมื่อรันโค้ดแล้วระบบแจ้งเออร์เรอร์:\n" +
        "   ให้ก๊อปปี้ข้อความแจ้งเตือนสีแดงจากใน Arduino IDE ส่งให้ AI ตรวจสอบตรงๆ\n\n" +
        "2. เมื่อไม่เข้าใจบทบาทของฟังก์ชันรับส่งรูปภาพ:\n" +
        "   ให้เขียนคำสั่งถามว่า 'ช่วยอธิบายการแปลงภาพเป็น Base64 ใน ESP32-CAM ให้หน่อยครับ'"
    );
}

window.onload = initSystem;
</script>
</body>
</html>
