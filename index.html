                codeBlock: `// โค้ด Google Apps Script (GAS) สำหรับใช้งานเป็น API
const FOLDER_ID = 'ใส่_FOLDER_ID_ของ_GOOGLE_DRIVE_ที่นี่'; 
const LINE_ACCESS_TOKEN = 'ใส่_CHANNEL_ACCESS_TOKEN_จาก_LINE_ที่นี่';
const LINE_USER_ID = 'ใส่_USER_ID_จาก_LINE_ที่นี่';

function doPost(e) {
  try {
    const parsedData = JSON.parse(e.postData.contents);
    const base64Image = parsedData.image; 
    if (!base64Image) {
      return ContentService.createTextOutput("Error: ไม่พบข้อมูลรูปภาพ").setMimeType(ContentService.MimeType.TEXT);
    }
    const decodedImage = Utilities.base64Decode(base64Image);
    const fileName = 'ESP32_Capture_' + Utilities.formatDate(new Date(), "GMT+7", "yyyyMMdd_HHmmss") + '.jpg';
    const blob = Utilities.newBlob(decodedImage, 'image/jpeg', fileName);
    const folder = DriveApp.getFolderById(FOLDER_ID);
    const file = folder.createFile(blob);
    
    // เปิดสิทธิ์ให้ LINE ดึงภาพไปแสดงได้
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    const imageUrl = "https://drive.google.com/uc?export=view&id=" + file.getId();

    sendToLine(imageUrl);
    return ContentService.createTextOutput("Success: บันทึกรูปและส่ง LINE เรียบร้อย").setMimeType(ContentService.MimeType.TEXT);
  } catch (error) {
    return ContentService.createTextOutput("Error: " + error.toString()).setMimeType(ContentService.MimeType.TEXT);
  }
}

function sendToLine(imageUrl) {
  const url = "https://api.line.me/v2/bot/message/push";
  const headers = { "Content-Type": "application/json", "Authorization": "Bearer " + LINE_ACCESS_TOKEN };
  const payload = {
    "to": LINE_USER_ID,
    "messages": [
      { "type": "text", "text": "🚨 ตรวจพบการเคลื่อนไหว! มีภาพถ่ายใหม่จาก ESP32-CAM" },
      { "type": "image", "originalContentUrl": imageUrl, "previewImageUrl": imageUrl }
    ]
  };
  UrlFetchApp.fetch(url, { "method": "post", "headers": headers, "payload": JSON.stringify(payload), "muteHttpExceptions": true });
}`

                codeBlock: `#include <WiFi.h>
#include <WiFiClientSecure.h>
#include <HTTPClient.h>
#include "esp_camera.h"
#include <base64.h>

const char* ssid = "YOUR_WIFI_NAME";
const char* password = "YOUR_WIFI_PASSWORD";
String GAS_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 

const int BUTTON_PIN = 14; 
bool isPressing = false;

// พินกล้องสำหรับรุ่น AI Thinker
#define PWDN_GPIO_NUM 32
#define RESET_GPIO_NUM -1
#define XCLK_GPIO_NUM 0
#define SIOD_GPIO_NUM 26
#define SIOC_GPIO_NUM 27
#define Y9_GPIO_NUM 35
#define Y8_GPIO_NUM 34
#define Y7_GPIO_NUM 39
#define Y6_GPIO_NUM 36
#define Y5_GPIO_NUM 21
#define Y4_GPIO_NUM 19
#define Y3_GPIO_NUM 18
#define Y2_GPIO_NUM 5
#define VSYNC_GPIO_NUM 25
#define HREF_GPIO_NUM 23
#define PCLK_GPIO_NUM 22

void setup() {
  Serial.begin(115200);
  pinMode(BUTTON_PIN, INPUT_PULLUP);
  WiFi.begin(ssid, password);
  while (WiFi.status() != WL_CONNECTED) { delay(500); Serial.print("."); }
  Serial.println("\\n✅ Wi-Fi Connected!");

  camera_config_t config;
  config.ledc_channel = LEDC_CHANNEL_0; config.ledc_timer = LEDC_TIMER_0;
  config.pin_d0 = Y2_GPIO_NUM; config.pin_d1 = Y3_GPIO_NUM; config.pin_d2 = Y4_GPIO_NUM;
  config.pin_d3 = Y5_GPIO_NUM; config.pin_d4 = Y6_GPIO_NUM; config.pin_d5 = Y7_GPIO_NUM;
  config.pin_d6 = Y8_GPIO_NUM; config.pin_d7 = Y9_GPIO_NUM; config.pin_xclk = XCLK_GPIO_NUM;
  config.pin_pclk = PCLK_GPIO_NUM; config.pin_vsync = VSYNC_GPIO_NUM; config.pin_href = HREF_GPIO_NUM;
  config.pin_sscb_sda = SIOD_GPIO_NUM; config.pin_sscb_scl = SIOC_GPIO_NUM;
  config.pin_pwdn = PWDN_GPIO_NUM; config.pin_reset = RESET_GPIO_NUM; config.xclk_freq_hz = 20000000;
  config.pixel_format = PIXFORMAT_JPEG; config.frame_size = FRAMESIZE_VGA; config.jpeg_quality = 12; config.fb_count = 1;

  esp_err_t err = esp_camera_init(&config);
  if (err != ESP_OK) { Serial.printf("Camera init failed\\n"); return; }
  Serial.println("✅ Camera Initialized!");
}

void loop() {
  int buttonState = digitalRead(BUTTON_PIN);
  if (buttonState == LOW && !isPressing) {
    isPressing = true;
    Serial.println("🔘 Button Pressed! Taking photo...");
    sendImageToGoogle();
    delay(5000); // ป้องกันบอร์ดกดส่งรัวๆ
  } else if (buttonState == HIGH) { isPressing = false; }
  delay(50);
}

void sendImageToGoogle() {
  camera_fb_t * fb = NULL;
  // เคลียร์เบอร์เฟอร์รูปเก่าออก 2 รอบ
  fb = esp_camera_fb_get(); esp_camera_fb_return(fb); delay(100);
  fb = esp_camera_fb_get(); esp_camera_fb_return(fb); delay(100);

  fb = esp_camera_fb_get();
  if (!fb) { Serial.println("❌ Capture Failed"); return; }

  String imageBase64 = base64::encode((uint8_t *)fb->buf, fb->len);
  esp_camera_fb_return(fb);

  WiFiClientSecure client; client.setInsecure();
  HTTPClient http; http.begin(client, GAS_URL);
  http.setFollowRedirects(HTTPC_STRICT_FOLLOW_REDIRECTS);
  http.addHeader("Content-Type", "application/json");

  String payload = "{\\"image\\":\\"" + imageBase64 + "\\"}";
  int httpCode = http.POST(payload);
  if (httpCode == HTTP_CODE_OK || httpCode == HTTP_CODE_FOUND) {
    Serial.println("✅ ส่งภาพสำเร็จ! เข้าไปดูใน LINE ได้เลย");
  } else { Serial.printf("❌ Error: %d\\n", httpCode); }
  http.end();
}`

                steps: [
                    "เปิดหน้าต่าง <b>Serial Monitor</b> ใน Arduino IDE และตั้งค่าความเร็วรับส่งข้อมูลไปที่ <b>115200 Baud Rate</b>",
                    "กดปุ่ม Reset บนบอร์ด สังเกตว่าต้องขึ้นข้อความว่า <code>Wi-Fi Connected!</code> และ <code>Camera Initialized!</code>",
                    "ลองทำการกดปุ่มสวิตช์ควบคุมที่ต่ออยู่ที่ขาพิน 14 จำนวน 1 ครั้ง",
                    "สังเกต Log ข้อความบนหน้าจอ Serial Monitor จะต้องแสดงสถานะการเคลียร์ภาพ แปรรหัส และขึ้นข้อความสำเร็จ",
                    "เปิดหน้าจอโทรศัพท์มือถือเข้าแอปพลิเคชัน LINE เพื่อเช็กความถูกต้องว่า บอทสามารถส่งรูปและรายงานแจ้งเตือนเข้ามาได้ทันทีหรือไม่"
                ],
                tip: "🎯 ชิ้นงานสำเร็จ: หากภาพถ่ายบันทึกลง Google Drive และแสดงผลบนหน้าแชตไลน์พร้อมกัน แสดงว่าคุณสอบผ่านภารกิจโครงงานนี้แล้ว!",
                codeBlock: null
            }
        };

        // ฟังก์ชันในการสลับเปลี่ยนหน้าจอวิชาเรียน
        function switchMission(key) {
            const mission = missionData[key];
            const container = document.getElementById('content-area');
            
            // อัปเดตการแสดงผลไฮไลต์สีของปุ่มที่ถูกกดบนแถบ Sidebar
            document.querySelectorAll('.mission-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white', 'font-medium');
                btn.classList.add('text-gray-400', 'hover:bg-gray-900', 'hover:text-white');
            });
            const activeBtn = document.getElementById(`btn-${key}`);
            activeBtn.classList.remove('text-gray-400', 'hover:bg-gray-900', 'hover:text-white');
            activeBtn.classList.add('bg-emerald-600', 'text-white', 'font-medium');

            // เจนเนอเรทโครงสร้าง HTML ของข้อมูลแต่ละ Mission ออกมาบนหน้าจอหลัก
            let stepsHtml = '';
            mission.steps.forEach((step, index) => {
                stepsHtml += `
                    <li class="flex items-start gap-3">
                        <span class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-950 border border-emerald-700 text-emerald-400 text-xs font-bold flex items-center justify-center mt-0.5">${index + 1}</span>
                        <span class="text-gray-300 text-sm leading-relaxed">${step}</span>
                    </li>
                `;
            });

            let codeSectionHtml = '';
            if(mission.codeBlock) {
                codeSectionHtml = `
                    <div class="mt-8">
                        <div class="flex items-center justify-between bg-gray-800 px-4 py-2 rounded-t-xl border-b border-gray-700">
                            <span class="text-xs font-mono text-gray-400"><i class="fa-solid fa-code-branch text-emerald-400"></i> Source Code สำหรับนักเรียน</span>
                            <button onclick="copyCode()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition text-emerald-300 font-medium">
                                <i class="fa-regular fa-copy"></i> คัดลอกโค้ด
                            </button>
                        </div>
                        <pre class="bg-gray-950 p-4 rounded-b-xl overflow-x-auto text-xs font-mono text-emerald-400 leading-relaxed border border-gray-800" id="code-snippet">${mission.codeBlock}</pre>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h2 class="heading-font text-2xl font-bold text-white">${mission.title}</h2>
                        <p class="text-sm text-gray-400 mt-2 leading-relaxed">${mission.desc}</p>
                    </div>
                    
                    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
                        <h3 class="heading-font text-base font-semibold text-emerald-400 mb-4"><i class="fa-solid fa-list-check"></i> ขั้นตอนการปฏิบัติงาน (Instructions)</h3>
                        <ul class="space-y-4">${stepsHtml}</ul>
                    </div>

                    <div class="bg-amber-950/20 border border-amber-900/60 rounded-xl p-4 text-xs flex items-start gap-3">
                        <i class="fa-solid fa-lightbulb text-amber-400 text-base mt-0.5"></i>
                        <span class="text-amber-200 leading-relaxed">${mission.tip}</span>
                    </div>

                    ${codeSectionHtml}
                </div>
            `;
        }

        // ฟังก์ชันช่วยอำนวยความสะดวกในการก็อปปี้โค้ดของเด็กนักเรียน
        function copyCode() {
            const codeText = document.getElementById('code-snippet').innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                alert('📋 คัดลอกโค้ดไปยังคลิปบอร์ดแล้ว! นักเรียนสามารถนำไปวางในโปรแกรมได้เลย');
            });
        }

        // สั่งให้หน้าจอแรกเริ่มรันหน้า Overview อัตโนมัติเมื่อเว็บถูกเปิดขึ้นมา
        window.onload = function() {
            switchMission('overview');
        };
    </script>
</body>
</html>
